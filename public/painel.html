<!doctype html>
<html>
  <head>
    <title>Painel de Controle</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      @import url("/css/painel.css");
    </style>
  </head>
  <body>

    
    <div id="setup-screen">
      <div class="setup-container">
        <h1 style="margin:0">Painel de Chat</h1>
        <p style="color:#888">Conecte o YouTube, o TikTok, ou ambos</p>

        
        <div class="platform-block" id="block-youtube">
          <div class="platform-header">
            <span class="platform-icon yt-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.38.55A3.02 3.02 0 0 0 .5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3.02 3.02 0 0 0 2.12 2.14C4.46 20.5 12 20.5 12 20.5s7.54 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/>
          </svg></span>
            <span class="platform-label">YouTube</span>
            <span class="status-dot" id="dot-yt"></span>
          </div>
          <input type="text" id="input-youtube" placeholder="URL ou ID da live do YouTube" />
          <div class="row-btns">
            <button id="btn-conectar-yt" class="btn btn-yt">CONECTAR</button>
            <button id="btn-parar-yt"    class="btn btn-stop" style="display:none">DESCONECTAR</button>
          </div>
        </div>

        
        <div class="platform-block" id="block-tiktok">
          <div class="platform-header">
            <span class="platform-icon tt-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
          </svg></span>
            <span class="platform-label">TikTok</span>
            <span class="status-dot" id="dot-tt"></span>
          </div>
          <input type="text" id="input-tiktok" placeholder="@usuario do TikTok" />
          <div class="row-btns">
            <button id="btn-conectar-tt" class="btn btn-tt">CONECTAR</button>
            <button id="btn-parar-tt"    class="btn btn-stop" style="display:none">DESCONECTAR</button>
          </div>
        </div>

        <button id="btn-abrir-painel" class="btn btn-painel" disabled>ABRIR PAINEL</button>
      </div>
    </div>

    
    <div id="main-screen">
      <header>
        <div class="header-status">
          <span class="status-badge" id="badge-yt">YouTube ●</span>
          <span class="status-badge" id="badge-tt">TikTok ●</span>
        </div>
        <div class="header-actions">
          <a target="_blank" class="anchor-button" href="http://localhost:3000/overlay">Overlay</a>
          <button id="btn-limpar-chat" class="btn btn-mini">Limpar Chat</button>
          <button id="btn-voltar-setup" class="btn btn-mini">Configurações</button>
        </div>
      </header>

      
      <div id="filtros">
        <button class="filtro ativo" data-src="todos">Todos</button>
        <button class="filtro" data-src="youtube">YouTube</button>
        <button class="filtro" data-src="tiktok">TikTok</button>
      </div>

      <div id="chat"></div>
    </div>

    <script src="/js/painel.js"></script>
  </body>
</html>
